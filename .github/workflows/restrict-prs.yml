name: Restrict PRs to collaborators

on:
  pull_request_target:
    types: [opened]

jobs:
  check-collaborator:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Check if author is a collaborator
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data } = await github.rest.repos.checkCollaborator({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.pull_request.user.login,
            }).catch(() => ({ data: null }));

            return data !== null;
          result-encoding: string

      - name: Close PR if not a collaborator
        if: steps.check.outputs.result == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const author = context.payload.pull_request.user.login;
            const pr = context.payload.pull_request.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body: `Olá @${author}, obrigado pelo interesse no projeto.\n\n` +
                    `Este repositório aceita contribuições apenas de colaboradores autorizados. ` +
                    `Este PR será fechado automaticamente.`,
            });

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr,
              state: 'closed',
            });
